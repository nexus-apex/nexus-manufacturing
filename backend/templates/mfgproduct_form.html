{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} MFGProduct | NexusMfg{% endblock %}
{% block page_title %}{% if editing %}Edit MFGProduct{% else %}New MFGProduct{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Sku</label>
        <input type="text" name="sku" value="{{ record.sku|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Category</label>
        <input type="text" name="category" value="{{ record.category|default:'' }}">
      </div>
      <div class="form-group">
        <label>Unit Cost</label>
        <input type="number" step="0.01" name="unit_cost" value="{{ record.unit_cost|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Selling Price</label>
        <input type="number" step="0.01" name="selling_price" value="{{ record.selling_price|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Stock</label>
        <input type="number" name="stock" value="{{ record.stock|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Min Stock</label>
        <input type="number" name="min_stock" value="{{ record.min_stock|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="active" {% if record.status == 'active' %}selected{% endif %}>Active</option>
          <option value="discontinued" {% if record.status == 'discontinued' %}selected{% endif %}>Discontinued</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Lead Time Days</label>
        <input type="number" name="lead_time_days" value="{{ record.lead_time_days|default:'0' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} MFGProduct</button>
      <a href="/mfgproducts/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
