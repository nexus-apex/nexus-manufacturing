{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} BillOfMaterial | NexusMfg{% endblock %}
{% block page_title %}{% if editing %}Edit BillOfMaterial{% else %}New BillOfMaterial{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Product Name</label>
        <input type="text" name="product_name" value="{{ record.product_name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Component</label>
        <input type="text" name="component" value="{{ record.component|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Quantity</label>
        <input type="number" name="quantity" value="{{ record.quantity|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Unit</label>
        <input type="text" name="unit" value="{{ record.unit|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Unit Cost</label>
        <input type="number" step="0.01" name="unit_cost" value="{{ record.unit_cost|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Total Cost</label>
        <input type="number" step="0.01" name="total_cost" value="{{ record.total_cost|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Supplier</label>
        <input type="text" name="supplier" value="{{ record.supplier|default:'' }}">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="active" {% if record.status == 'active' %}selected{% endif %}>Active</option>
          <option value="obsolete" {% if record.status == 'obsolete' %}selected{% endif %}>Obsolete</option>
        </select>
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} BillOfMaterial</button>
      <a href="/billofmaterials/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
